repos:
  - repo: local
    hooks:
      - id: ruff-lint
        name: Ruff lint
        entry: uv run ruff check .
        language: system
        pass_filenames: false

      - id: ruff-format
        name: Ruff format
        entry: uv run ruff format
        language: system
        pass_filenames: false

      - id: ty-check
        name: Ty type check
        entry: uv run ty check
        language: system
        pass_filenames: false

      - id: pytest
        name: Pytest
        entry: uv run pytest
        language: system
        pass_filenames: false
        stages: [pre-push]